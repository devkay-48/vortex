<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#091A34"/>
      <stop offset="1" stop-color="#020105"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#377FFF"/>
      <stop offset="1" stop-color="#4500AE"/>
    </linearGradient>
    <clipPath id="shape">
      <rect width="128" height="128" rx="28" ry="28"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>
  <!-- Funnel/triangle arrow clipped inside rounded rect -->
  <g clip-path="url(#shape)">
    <polygon
      points="64,92 18,36 110,36"
      fill="url(#arrow)"
    />
  </g>
</svg>

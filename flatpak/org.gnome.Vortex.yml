app-id: org.gnome.Vortex
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: vortex

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=home
  - --talk-name=org.freedesktop.portal.FileChooser

modules:
  - name: yt-dlp
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation yt-dlp
    sources:
      - type: shell
        commands:
          - pip3 download --no-deps --dest . yt-dlp

  - name: vortex
    buildsystem: meson
    config-opts:
      - --prefix=/app
    sources:
      - type: dir
        path: ..
